<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <!-- Font Awesome for the icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Link to external CSS -->
    <link rel="stylesheet" href="emp_login.css">
</head>
<body>

    <div class="login-wrapper">
        <div class="login-box">
            <div style="margin-bottom: 30px;">
                <img  src="../assets/opptylogo.png" alt="Logo" style="width: 150px; height: 40px;">
            </div>
            <h2>Welcome to Oppty</h2>
            <p class="text-muted" style="margin-bottom: 30px;">Please login to your account</p>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input id="email" type="email" class="form-control" value="steperde124@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input id="password" type="password" class="form-control" value="password123">
                </div>
                <div class="flex justify-between items-center" style="margin-bottom: 20px;">
                    <label style="font-size: 12px; cursor: pointer;">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" style="font-size: 12px; color: #FF5B1E; text-decoration: none;">Forgot Password?</a>
                </div>
                <button type="submit" class="btn btn-primary login-btn">Sign In</button>
            </form>
            <!-- <p style="margin-top: 20px; font-size: 12px;">Don't have an account? <a href="#" class="fw-bold" style="color: #FF5B1E;">Sign up</a></p> -->
        </div>
    </div>

    <!-- Link to external JavaScript -->
    <script src="emp_login.js"></script>
</body>
</html>
