          </div>
        </a>
      </li>

      <!-- Employees -->
      <li class="menu-item">
        <a href="../employee_page/employee.html" class="menu-link">

          </div>

      </li>

      <li class="menu-item">

            <span>Attendance</span>
          </div>
        </a>
      </li>
      <li class="menu-item">
        <a href="../apply_leave/leave.html" class="menu-link">

        </a>
      </li>

      <!-- Asset Allocation -->
      <li class="menu-item">

          </div>
        </a>
      </li>

      <li class="menu-item">

            <i class="fa-solid fa-file-lines"></i>

        </a>

  </div>

        <!-- MAIN CONTENT (Your Existing Code Wrapped) -->
        <main class="main-content" id="mainContent">
            
            <div class="container">

                    <div class="flex items-center gap-10">

                        </button>
                        
                        <div class="page-title">

                            </div>
                        </div>
                    </div>
                    <!-- Right Side: Search & Filter -->
    <div class="header-right">
        <div class="search-box-wrapper">
            <!-- Filter Dropdown -->
            <select id="searchFilter" class="search-select">
                <option value="all">All</option>
                <option value="name">Name</option>
                <option value="id">ID</option>
                <option value="role">Role</option>
            </select>
            
            <!-- Divider -->
            <div class="search-divider"></div>

            <!-- Input Field -->
            <input type="text" id="searchInput" class="search-input" placeholder="Search employee...">
            
            <!-- Search Button -->
            <button id="searchBtn" class="search-btn">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </div>
    </div>
                    
                </header>
            </div>

        <!-- CONTENT SCROLLABLE AREA -->
        <div class="content-scroll">

                <div class="data-panel">
                    <div class="panel-header">
                        <h2>Pay Slips</h2>
                    </div>

                    <!-- Controls -->
                    <div class="controls-row">
                        <div class="select-group">
                            <label>Financial Year</label>
                            <select id="yearSelect">
                                <option value="2025-2026">2025 - 2026</option>
                                <option value="2024-2025">2024 - 2025</option>
                            </select>
                        </div>
                        <button class="btn-outline" onclick="downloadSlips()">
                            <i class="fa-solid fa-download"></i> Download All
                        </button>
                    </div>

                    <p class="info-text">Click on the date to view details.</p>

                    <!-- Table -->
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Month</th>
                                    <th>Title</th>
                                    <th>Gross</th>
                                    <th>In-hand</th>
                                </tr>
                            </thead>
                            <tbody id="payslipTableBody">
