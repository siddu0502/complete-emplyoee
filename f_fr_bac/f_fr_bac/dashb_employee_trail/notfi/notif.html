<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Header</title>
    
    <!-- Icons & Font -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Link to external CSS -->
    <link rel="stylesheet" href="./notif.css">
</head>
<body>

    <!-- Main Container for Icons -->
    <div class="top-bar">

        <!-- 1. NOTIFICATION COMPONENT -->
        <div class="wrapper notification-wrapper">
            <button class="icon-btn bell-btn" onclick="toggleNotifications()">
                <i class="fa-regular fa-bell"></i>
                <span class="badge">3</span>
            </button>

            <div class="dropdown-box notif-dropdown" id="notificationBox">
                <div class="dropdown-header">Notifications</div>
                
                <div class="notif-item">
                    <div class="notif-icon"><i class="fa-solid fa-check"></i></div>
                    <div class="notif-content">
                        <h4>Leave Approved</h4>
                        <p>Your leave request was approved.</p>
                        <span class="time">Just now</span>
                    </div>
                </div>

                <div class="notif-item">
                    <div class="notif-icon" style="background: #FFF5F8; color: #F1416C;">
                        <i class="fa-solid fa-triangle-exclamation"></i>
                    </div>
                    <div class="notif-content">
                        <h4>Attendance Alert</h4>
                        <p>You forgot to punch out.</p>
                        <span class="time">2 hours ago</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 2. PROFILE COMPONENT -->
        <div class="wrapper profile-wrapper">
            <!-- Profile Image Button -->
            <button class="profile-btn" onclick="toggleProfile()">
                <img src="https://i.pravatar.cc/150?img=3" alt="User">
                <span class="status-dot"></span>
            </button>

            <!-- Profile Dropdown -->
            <div class="dropdown-box profile-dropdown" id="profileBox">
                <!-- User Info Header -->
                <div class="profile-header">
                    <div class="user-img-large">
                        <img src="https://i.pravatar.cc/150?img=3" alt="User">
                    </div>
                    <div class="user-details">
                        <h3>John Doe</h3>
                        <p>Employee ID: #9821</p>
                    </div>
                </div>

                <!-- Menu Links -->
                <ul class="profile-menu">
                    <li><a href="#"><i class="fa-regular fa-user"></i> My Profile</a></li>
                    <li><a href="#"><i class="fa-solid fa-gear"></i> Settings</a></li>
                </ul>

                <!-- Logout Section -->
                <div class="logout-section">
                    <button class="logout-btn" onclick="logoutUser()">
                        <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
                    </button>
                </div>
            </div>
        </div>

    </div>

    <!-- Link to external JS -->
    <script src="./notif.js"></script>

</body>
</html>
